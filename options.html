<!DOCTYPE html>
<html>
<head>
  <title>Select Mode</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter&display=swap" rel="stylesheet">

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f7f3ef;
      font-family: 'Inter', sans-serif;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-family: "Brush Script MT", cursive;
      font-size: 56px;
      color: #5c4033;
      margin-bottom: 10px;
    }

    p {
      font-size: 16px;
      color: #7a6f66;
      margin-bottom: 25px;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    button {
      padding: 12px 28px;
      font-size: 15px;
      border: none;
      border-radius: 8px;
      background-color: #c8a97e;
      color: white;
      cursor: pointer;
      width: 220px;
      transition: 0.2s ease;
    }

    button:hover {
      background-color: #b8966d;
    }

    .home-button {
      position: fixed;
      top: 20px;
      left: 20px;
      padding: 10px 16px;
      background-color: #5c4033;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      transition: 0.2s ease;
    }

    .home-button:hover {
      background-color: #3e2a22;
    }

  </style>
</head>

<body>

  <a href="index.html" class="home-button">Home</a>
  
  <div class="container">
    <h1>Ads Data Input</h1>
    <p>Select how you want to input advertising data.</p>

    <div class="btn-group">
      <button onclick="autoMode()">Auto Generate Data</button>
      <button onclick="manualMode()">Manual Input Data</button>
    </div>

    <script>
    function autoMode() {
      window.location.href = "auto.html";
    }
    function manualMode() {
      window.location.href = "manual.html";
    }
    </script>

  </div>

</body>
</html>
