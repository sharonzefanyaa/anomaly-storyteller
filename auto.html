<!DOCTYPE html>
<html>
<head>
  <title>Auto Generate Data</title>

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f7f3ef;
    }

    .container {
      text-align: center;
      max-width: 600px;
    }

    h1 {
      font-family: "Brush Script MT", cursive;
      font-size: 52px;
      color: #5c4033;
      margin-bottom: 10px;
    }

    .status {
      font-size: 16px;
      color: #7a6f66;
      margin-top: 10px;
    }

    .dot::after {
      content: '';
      animation: dots 1.2s steps(4, end) infinite;
    }

    @keyframes dots {
      0% { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
      100% { content: ''; }
    }

    .success {
      color: #4a6b4a;
      font-weight: 500;
    }

    .error {
      color: #a35c5c;
      font-weight: 500;
    }

    .preview {
      margin-top: 20px;
      text-align: left;
      background: #fff;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .preview h3 {
      margin-top: 0;
      color: #5c4033;
      text-align: center;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    td {
      padding: 6px 10px;
      border-bottom: 1px solid #eee;
    }

    td:first-child {
      font-weight: bold;
      color: #5c4033;
      width: 40%;
      background: #f3ece6;
    }

    .home-button {
      position: fixed;
      top: 20px;
      left: 20px;
      padding: 10px 16px;
      background-color: #5c4033;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      transition: 0.2s ease;
    }

    .home-button:hover {
      background-color: #3e2a22;
    }

  </style>
</head>

<body>

  <a href="index.html" class="home-button">Home</a>

  <div class="container">

    <h1>Data Generator</h1>

    <div class="status" id="status">
      Generating data<span class="dot"></span>
    </div>

    <div id="preview"></div>

  </div>

  <script>
    window.onload = function () {

      const status = document.getElementById("status");
      const preview = document.getElementById("preview");

      fetch("http://127.0.0.1:5000/auto", {
        method: "POST"
      })
      .then(res => res.json())
      .then(res => {

        console.log("RESPONSE:", res); // DEBUG

        // ambil data dari res.data
        const data = res.data || res;

        setTimeout(() => {

          status.innerHTML =
            "Data has been generated successfully at " + (data.datetime || "-");

          status.classList.add("success");

          preview.innerHTML = `
            <div class="preview">
              <h3>Preview Data</h3>

              <table>
                <tr><td>Datetime</td><td>${data.datetime || "-"}</td></tr>
                <tr><td>Platform</td><td>${data.platform || "-"}</td></tr>
                <tr><td>Campaign Name</td><td>${data.campaign_name || "-"}</td></tr>
                <tr><td>Campaign Status</td><td>${data.campaign_status || "-"}</td></tr>
                <tr><td>Creative Type</td><td>${data.creative_type || "-"}</td></tr>
                <tr><td>Audience Type</td><td>${data.audience_type || "-"}</td></tr>
                <tr><td>Impressions</td><td>${data.impressions ?? "-"}</td></tr>
                <tr><td>Clicks</td><td>${data.clicks ?? "-"}</td></tr>
                <tr><td>Registrations</td><td>${data.registrations ?? "-"}</td></tr>
                <tr><td>Cost</td><td>${data.cost ?? "-"}</td></tr>
                <tr><td>Frequency</td><td>${data.frequency ?? "-"}</td></tr>
              </table>
            </div>
          `;

        }, 800);

      })
      .catch(err => {
        console.error(err);

        status.innerHTML = "Failed to generate data";
        status.classList.add("error");
      });

    };
  </script>

</body>
</html>
